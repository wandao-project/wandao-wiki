<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文道维基 - 数字化人文实验室</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDBexjyMOKoCi1iEmSDE-YlbcP-ilrq1Nc",
            authDomain: "wandao-wiki.firebaseapp.com",
            projectId: "wandao-wiki",
            storageBucket: "wandao-wiki.firebasestorage.app",
            messagingSenderId: "1091649219063",
            appId: "1:1091649219063:web:c08c402dafabd5989ae6f2"
        };
        const app = initializeApp(firebaseConfig);
        window._auth = getAuth(app);
        window._signIn = signInWithEmailAndPassword;
        window._signUp = createUserWithEmailAndPassword;
    </script>
    <style>
        /* [UI样式已省略，请使用您之前确认过的琥珀金涟漪样式] */
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#F9F8F4; font-family:"STSong", serif; color:#2C2416; }
        .ui-container { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; }
        .auth-card { background:rgba(249, 248, 244, 0.85); border:1px solid rgba(212, 175, 55, 0.18); border-radius:8px; padding:40px; width:340px; box-shadow:0 20px 50px rgba(212, 175, 55, 0.08); backdrop-filter:blur(20px); }
        .submit-btn { width:100%; background:#2C2416; color:#fff; border:none; padding:14px 0; cursor:pointer; }
        .submit-btn:hover { background:#D4AF37; }
    </style>
</head>
<body>
<canvas id="ink-canvas"></canvas>
<div class="ui-container">
    <div class="auth-card">
        <div id="tabs">
            <span class="auth-tab active" id="tab-login" onclick="switchMode('login')">登录</span>
            <span class="auth-tab" id="tab-register" onclick="switchMode('register')">注册</span>
        </div>
        <input type="email" id="input-email" placeholder="邮箱" />
        <input type="password" id="input-password" placeholder="密码" />
        <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">验证并登录</button>
    </div>
</div>
<script>
    let currentMode = 'login';
    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('submit-btn').textContent = mode === 'login' ? '验证并登录' : '注册并进入';
    }
    async function handleSubmit() {
        const email = document.getElementById('input-email').value;
        const password = document.getElementById('input-password').value;
        try {
            if (currentMode === 'login') {
                await window._signIn(window._auth, email, password);
            } else {
                await window._signUp(window._auth, email, password);
            }
            // 登录成功后跳转
            window.location.href = "graph.html";
        } catch (e) {
            alert("验证未通过，请核对凭据");
        }
    }
</script>
</body>
</html>
