<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文道维基 · 司南图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#FDFBF7; font-family:"STSong", serif; overflow:hidden; }
        #graph-container { position:fixed; inset:0; z-index:1; }
        #open-modal-btn { 
            position:fixed; bottom:30px; right:30px; z-index:9999; 
            padding:12px 24px; background:#FDFBF7; border:1px solid #D4AF37; 
            color:#D4AF37; border-radius:30px; cursor:pointer; font-family:inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #modal-overlay { position:fixed; inset:0; z-index:10000; background:rgba(0,0,0,0.3); display:none; align-items:center; justify-content:center; }
        #modal-overlay.active { display:flex; }
        #modal-box { background:#fff; padding:30px; border-radius:8px; width:400px; }
    </style>
</head>
<body>
    <div id="graph-container"></div>
    <button id="open-modal-btn">续写文脉</button>
    <div id="modal-overlay"><div id="modal-box"><h3>添加/编辑内容</h3><div id="fields"></div><button id="submit-btn">提交并同步云端</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const config = { /* 您的 Firebase 配置 */ };
        const db = getFirestore(initializeApp(config));
        const graphRef = doc(db, "graph", "main");

        // 您的完整数据底本
        const fullDataset = {
            "nodes": [
                { "id": "李商隐", "type": "人物", "radius": 28, "desc": "晚唐诗人..." },
                /* 请确保此处填入您全部 22 个节点 */
            ],
            "links": [
                { "source": "李商隐", "target": "令狐楚", "relation": "师门" }
                /* 请确保此处填入您全部 33 条连线 */
            ]
        };

        // 监听云端，自动同步逻辑
        onSnapshot(graphRef, (snap) => {
            let data = fullDataset; // 默认使用内置数据
            if (snap.exists() && snap.data().nodes && snap.data().nodes.length > 5) {
                data = snap.data(); // 如果云端有完整数据，优先用云端
            } else {
                setDoc(graphRef, fullDataset); // 自动修复：云端如果格式错误，强行覆盖为完整数据
            }
            drawGraph(data);
        });

        function drawGraph(data) {
            const container = document.getElementById("graph-container");
            container.innerHTML = "";
            // ... (插入您的 D3 渲染代码)
        }

        // 提交修改
        document.getElementById("submit-btn").onclick = async () => {
            // 获取表单值后调用
            await updateDoc(graphRef, { 
                nodes: arrayUnion({ /* 新节点或修改后的数据 */ }) 
            });
            alert("已同步至云端！");
        };
    </script>
</body>
</html>
