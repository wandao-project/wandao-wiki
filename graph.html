<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文道维基 - 司南图谱 (修复版)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBexjyMOKoCi1iEmSDE-YlbcP-ilrq1Nc",
            authDomain: "wandao-wiki.firebaseapp.com",
            projectId: "wandao-wiki",
            storageBucket: "wandao-wiki.firebasestorage.app",
            messagingSenderId: "1091649219063",
            appId: "1:1091649219063:web:c08c402dafabd5989ae6f2",
            measurementId: "G-G4V0892Z4K"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        const graphRef = doc(db, "graph", "main");

        // 您那份珍贵的李商隐考据数据
        const realData = {
            "nodes": [{"id":"李商隐","type":"人物","radius":35,"desc":"晚唐诗坛巨擘..."},{"id":"令狐楚","type":"人物","radius":20,"desc":"唐代重臣..."}],
            "links": [{"source":"李商隐","target":"令狐楚","relation":"师门"}]
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById("graph-container").innerHTML = "<h2 style='text-align:center; margin-top:200px;'>请先登录</h2>";
                return;
            }
            
            // 实时监听数据库
            onSnapshot(graphRef, (snap) => {
                const data = snap.data();
                if (!snap.exists() || !data.nodes || data.nodes.length < 5) {
                    // 如果发现数据不对，显示注入按钮
                    document.getElementById("graph-container").innerHTML = `
                        <div style="text-align:center; padding-top:200px;">
                            <button id="inject-btn" style="padding:20px; font-size:20px; cursor:pointer;">点我将李商隐数据注入云端</button>
                        </div>`;
                    document.getElementById("inject-btn").onclick = async () => {
                        await setDoc(graphRef, realData);
                        alert("注入成功，即将刷新！");
                        location.reload();
                    };
                } else {
                    // 数据正常，渲染图谱
                    if (window.initGraph) window.initGraph(data.nodes, data.links);
                }
            });
        });
    </script>
</head>
<body>
    <div id="graph-container"></div>
    <script>
        // 确保 initGraph 逻辑存在
        window.initGraph = function(nodes, links) {
            console.log("准备渲染节点:", nodes.length);
            // 这里放您原本那套完整的 D3 渲染逻辑...
        }
    </script>
</body>
</html>
