<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文道维基 - 司南图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --amber-gold: #D4AF37; --silk-white: #FDFBF7; --ink-dark: #2C2C2C; --ink-gray: #888888; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--silk-white); font-family: "STSong", serif; overflow: hidden; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; inset: 0; }
        .node text { pointer-events: none; fill: var(--ink-dark); font-size: 15px; font-weight: bold; }
        .link { stroke-opacity: 0.6; }
    </style>
</head>
<body>
    <div id="graph-container"></div>
    <script type="module">
        // 核心数据 (这是您最真实、严谨的考据底本)
        const localData = {
            "nodes": [
                { "id": "李商隐", "type": "人物", "radius": 35, "desc": "字义山..." },
                { "id": "令狐楚", "type": "人物", "radius": 20, "desc": "唐代重臣..." },
                /* ...此处为您的所有节点... */
            ],
            "links": [
                { "source": "李商隐", "target": "令狐楚", "relation": "师门" }
                /* ...此处为您的所有连线... */
            ]
        };

        // 渲染函数：只负责画图，不负责纠结数据来源
        window.initGraph = function(nodes, links) {
            const container = document.getElementById("graph-container");
            container.innerHTML = "";
            const svg = d3.select(container).append("svg").attr("width", window.innerWidth).attr("height", window.innerHeight);
            const g = svg.append("g");
            
            // 简单的力导向图渲染
            const simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(140))
                .force("charge", d3.forceManyBody().strength(-550))
                .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));

            const link = g.append("g").selectAll("line").data(links).enter().append("line").attr("stroke", "#999");
            const node = g.append("g").selectAll("circle").data(nodes).enter().append("circle").attr("r", d => d.radius).attr("fill", "#D4AF37");

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
            });
        };

        // 直接初始化，确保 100% 出现
        window.initGraph(localData.nodes, localData.links);
    </script>
</body>
</html>
