<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文道维基 - 司南图谱 v3.6.0 实时云端并网版</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBexjyMOKoCi1iEmSDE-YlbcP-ilrq1Nc",
            authDomain: "wandao-wiki.firebaseapp.com",
            projectId: "wandao-wiki",
            storageBucket: "wandao-wiki.firebasestorage.app",
            messagingSenderId: "1091649219063",
            appId: "1:1091649219063:web:c08c402dafabd5989ae6f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const graphRef = doc(db, "graph", "main");

        window._fb = { db, auth, graphRef, updateDoc, arrayUnion, getDoc };

        /* ── 鉴权守卫与 UI 联动 ── */
        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById("open-modal-btn");
            const authBtn = document.getElementById("auth-toggle-btn");
            const authLabel = document.getElementById("auth-status-label");

            if (user) {
                if (btn) { btn.removeAttribute("disabled"); btn.style.opacity = "1"; btn.style.cursor = "pointer"; }
                if (authLabel) authLabel.textContent = user.email.split("@")[0];
                if (authBtn) authBtn.textContent = "登出";
                window._currentUser = user;
            } else {
                if (btn) { btn.setAttribute("disabled", "true"); btn.style.opacity = "0.45"; btn.style.cursor = "not-allowed"; }
                if (authLabel) authLabel.textContent = "未登录";
                if (authBtn) authBtn.textContent = "登入";
                window._currentUser = null;
            }
        });

        /* ── Firestore 实时监听 (已接入轮询机制) ── */
        onSnapshot(graphRef, (snap) => {
            if (!snap.exists()) {
                console.warn("Firestore: graph/main 文档不存在");
                return;
            }
            const data = snap.data();
            const nodes = data.nodes || [];
            const links = data.links || [];

            // 使用轮询等待渲染函数就绪
            waitForInitGraph(() => {
                window.initGraph(nodes, links);
            });
        });

        function waitForInitGraph(callback, timeout = 5000, interval = 50) {
            const start = Date.now();
            const timer = setInterval(() => {
                if (typeof window.initGraph === "function") {
                    clearInterval(timer);
                    callback();
                } else if (Date.now() - start > timeout) {
                    clearInterval(timer);
                    console.error("渲染引擎加载超时");
                }
            }, interval);
        }

        window.handleAuthToggle = function() {
            if (window._currentUser) {
                signOut(auth).then(() => document.getElementById("auth-panel").classList.remove("open"));
            } else {
                document.getElementById("auth-panel").classList.toggle("open");
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById("auth-email").value.trim();
            const password = document.getElementById("auth-password").value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById("auth-panel").classList.remove("open");
            } catch (e) {
                document.getElementById("auth-error").textContent = "登录失败，请重试";
            }
        };
    </script>
    <style>
        /* (请保留您之前的 CSS 样式，此处省略以节省空间，直接粘贴您原文件里的 CSS 即可) */
        :root { --amber-gold: #D4AF37; --silk-white: #FDFBF7; --ink-dark: #2C2C2C; --ink-gray: #888888; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--silk-white); font-family: "STSong", serif; overflow: hidden; }
        #graph-container { width: 100vw; height: 100vh; }
        /* 建议将原文件 <style> 中的其余部分复制粘贴到这里 */
    </style>
</head>
<body>
    <div id="graph-container"></div>
    <button id="open-modal-btn" disabled>续写文脉</button>
    <script>
        /* 核心绘图引擎 */
        window.initGraph = function(nodes, links) {
            const container = d3.select("#graph-container");
            container.selectAll("*").remove(); // 清除旧图
            
            const svg = container.append("svg").attr("width", window.innerWidth).attr("height", window.innerHeight);
            const g = svg.append("g");
            
            // ... (您的原有渲染代码) ...
            console.log("云端图谱绘制完成");
        };
    </script>
</body>
</html>
